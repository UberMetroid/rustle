<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Rustle</title>
    
    <!-- Nuclear Service Worker Unregister - Fixes the White Screen -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log('Broken SW Unregistered');
                }
            });
        }
        // Force refresh if we were stuck
        if (window.location.hash === '#reload') {
            window.location.hash = '';
        } else if (document.referrer.includes(window.location.host) === false) {
            // Optional: force a clean reload once
        }
    </script>

    <link data-trunk rel="css" href="style/tailwind.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

</body>
</html>
