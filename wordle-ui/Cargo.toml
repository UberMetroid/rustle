[package]
name = "wordle-ui"
version = "0.1.0"
edition = "2021"

[dependencies]
leptos = { version = "0.6", features = ["csr"] }
wordle-engine = { path = "../wordle-engine" }
console_error_panic_hook = "0.1"
gloo-timers = "0.3"
chrono = "0.4"
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.4"

[profile.release]
lto = true
opt-level = 'z'
codegen-units = 1
panic = 'abort'
strip = true
