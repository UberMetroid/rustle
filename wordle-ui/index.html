<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <title>RUSTLE</title>
    <link data-trunk rel="tailwind-css" href="style/tailwind.css">
    <link data-trunk rel="copy-file" href="public/manifest.json">
    <link data-trunk rel="copy-file" href="public/sw.js">
    <link data-trunk rel="copy-dir" href="public/icons">
    <link rel="manifest" href="/manifest.json">
    <script>
        // BLOCKING THEME INITIALIZATION
        (function() {
            const savedTheme = localStorage.getItem('color-theme');
            if (savedTheme) {
                document.documentElement.className = 'theme-' + savedTheme;
            } else {
                const themes = ['red', 'orange', 'yellow', 'green', 'blue'];
                const randomTheme = themes[Math.floor(Math.random() * themes.length)];
                document.documentElement.className = 'theme-' + randomTheme;
                localStorage.setItem('color-theme', randomTheme);
            }
        })();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(error => {
                    console.log('ServiceWorker registration failed: ', error);
                });
            });
        }
    </script>
</head>
<body class="bg-black overflow-hidden fixed inset-0">
    <div id="root"></div>
    <canvas id="victory-canvas" class="fixed inset-0 pointer-events-none z-[200] opacity-0 transition-opacity duration-1000"></canvas>
    
    <script>
        // HIGH-PERFORMANCE 80s ARCADE CELEBRATION ENGINE
        function cyberpunkVictory(theme, isHard, isNGPlus) {
            const canvas = document.getElementById('victory-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.opacity = '1';

            const particles = [];
            const powerMult = (isHard ? 1.5 : 1.0) * (isNGPlus ? 2.5 : 1.0);
            const particleCount = 150 * powerMult;

            const colors = {
                red: ['#ff0000', '#ff4444', '#880000', '#ff8888'],
                orange: ['#f97316', '#fb923c', '#c2410c', '#fdba74'],
                yellow: ['#eab308', '#facc15', '#a16207', '#fef08a'],
                green: ['#00ff00', '#44ff44', '#008800', '#88ff88'],
                blue: ['#0000ff', '#4444ff', '#000088', '#8888ff']
            }[theme] || ['#00ff00'];

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 15 * powerMult,
                    vy: (Math.random() - 0.5) * 15 * powerMult,
                    size: Math.random() * 4 + 1,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0,
                    decay: Math.random() * 0.02 + 0.005,
                    isGlitch: Math.random() > 0.9,
                    char: String.fromCharCode(0x30A0 + Math.random() * 96)
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;

                    if (theme === 'green' || p.isGlitch) {
                        ctx.font = `${p.size * 4}px monospace`;
                        ctx.fillStyle = p.color;
                        ctx.fillText(p.char, p.x, p.y);
                    } else {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }

                    if (p.life <= 0) particles.splice(i, 1);
                });

                if (particles.length > 0) {
                    requestAnimationFrame(animate);
                } else {
                    canvas.style.opacity = '0';
                    setTimeout(() => { ctx.clearRect(0, 0, canvas.width, canvas.height); }, 1000);
                }
            }
            animate();
        }
    </script>
</body>
</html>
